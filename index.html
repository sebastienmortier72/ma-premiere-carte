<!DOCTYPE html>
<html>
<head>
    <title>Ma Carte des Communes</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 600px; width: 100%; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // 2. Initialiser la carte (Centrée sur la France par défaut)
        var map = L.map('map').setView([46.6, 2.2], 6);

        // 3. Ajouter un fond de carte (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 4. Ton script de fetch (inchangé mais placé ici)
        fetch('resultat.geojson') 
            .then(res => {
                if (!res.ok) throw new Error("Fichier resultat.geojson introuvable");
                return res.json();
            })
            .then(data => {
        var coucheCommunes = L.geoJSON(data, {
            style: {
                color: "#2c3e50",
                weight: 1,
                fillColor: "#3498db",
                fillOpacity: 0.4
            },
            onEachFeature: function (feature, layer) {
                let nomCommune = feature.properties.NOM || "Nom inconnu";
                let infoRobot = feature.properties.status_robot || "En attente...";
                layer.bindPopup("<b>Commune :</b> " + nomCommune + "<br><b>Status :</b> " + infoRobot);
            }
        }).addTo(map);

        // AJOUTE CECI : La carte s'ajuste toute seule aux communes
        map.fitBounds(coucheCommunes.getBounds());
    })
            .catch(err => console.error("Erreur :", err));
    </script>
</body>
</html>
