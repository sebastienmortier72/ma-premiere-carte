<!DOCTYPE html>
<html>
<head>
    <title>Ma Carte Web</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* On dit à la carte de prendre toute la page */
        #map { height: 100vh; width: 100%; margin: 0; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. On initialise la carte sur des coordonnées (ici Paris)
        var map = L.map('map').setView([48.8566, 2.3522], 13);

        // 2. On ajoute un fond de carte (OpenStreetMap)
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 3. On ajoute un petit marqueur
        L.marker([48.8566, 2.3522]).addTo(map)
            .bindPopup('Salut ! Ma carte est en ligne.')
            .openPopup();
    </script>
</body>
</html>
